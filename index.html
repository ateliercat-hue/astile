<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>AppSphere — Магазин приложений</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    :root {
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #6e6e80;
      --accent: #4f6ef7;
      --accent-dark: #3b54d4;
      --star: #f5a623;
      --heart: #ff4757;
      --heart-bg: #ffe0e4;
      --green: #2ed573;
      --red: #ff4757;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.14);
      --radius: 16px;
      --font: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --transition: 0.2s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; height: 100%; }
    body {
      font-family: var(--font);
      background: #e8eaf0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
    }
    .app-shell {
      flex:1;
      display: flex;
      flex-direction: column;
      width: 100%;
      background: var(--bg);
      position: relative;
      overflow-x: hidden;
    }
    .header {
      position: sticky;
      top:0;
      z-index:100;
      background: var(--bg);
      padding: 12px 16px 8px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid transparent;
      transition: var(--transition);
    }
    .header.scrolled { border-bottom-color: rgba(0,0,0,0.08); box-shadow: var(--shadow-sm); }
    .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4f6ef7, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      cursor: pointer;
      flex-shrink: 0;
      user-select: none;
    }
    .search-wrap { flex:1; position: relative; min-width: 0; }
    .search-input {
      width:100%;
      padding: 11px 16px 11px 40px;
      border:2px solid #e2e4ea;
      border-radius:28px;
      font-size:0.9rem;
      background:#fff;
      outline:none;
      transition: var(--transition);
      font-family: var(--font);
    }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(79,110,247,0.08); }
    .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:1.1rem; color:#999; pointer-events:none; }
    .search-clear {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:#e2e4ea; border:none; border-radius:50%; width:22px; height:22px;
      cursor:pointer; font-size:0.7rem; display:none; align-items:center; justify-content:center; color:#666;
    }
    .search-clear.visible { display:flex; }
    .categories-scroll {
      display:flex; gap:8px; overflow-x:auto; padding:4px 16px 6px;
      scroll-behavior:smooth; -webkit-overflow-scrolling:touch; flex-shrink:0;
      scrollbar-width: none;
    }
    .categories-scroll::-webkit-scrollbar { display:none; }
    .cat-pill {
      flex-shrink:0; padding:8px 16px; border-radius:22px; font-size:0.8rem; font-weight:600;
      cursor:pointer; border:2px solid #e2e4ea; background:#fff; color:var(--text-secondary);
      transition:var(--transition); white-space:nowrap; font-family:var(--font);
    }
    .cat-pill.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 4px 14px rgba(79,110,247,0.3); transform:scale(1.03); }
    .main-content { flex:1; padding:4px 16px 100px; display:flex; flex-direction:column; gap:8px; }
    .section-title { font-size:1.05rem; font-weight:700; color:var(--text); padding:8px 4px 2px; display:flex; align-items:center; gap:6px; }
    .count { font-weight:400; font-size:0.8rem; color:var(--text-secondary); background:#e8eaf0; padding:2px 10px; border-radius:12px; }
    .app-grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap:10px;
    }
    @media (min-width: 600px) { .app-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 900px) { .app-grid { grid-template-columns: repeat(4, 1fr); } }
    .app-card {
      background:var(--card-bg); border-radius:var(--radius); padding:14px 12px 12px;
      cursor:pointer; transition:var(--transition); box-shadow:var(--shadow-sm);
      display:flex; flex-direction:column; gap:8px; border:1.5px solid transparent;
      animation:fadeInUp 0.4s ease forwards; opacity:0; min-width:0; word-break:break-word;
    }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
    .app-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); border-color:#e8eaf0; }
    .app-card:active { transform:scale(0.97); }
    .app-card-header { display:flex; align-items:center; gap:10px; }
    .app-icon {
      width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center;
      font-size:2rem; flex-shrink:0; background:#f0f2f8;
    }
    .gradient-1 { background:linear-gradient(135deg,#ff6b6b,#ff8e53); }
    .gradient-2 { background:linear-gradient(135deg,#4facfe,#00f2fe); }
    .gradient-3 { background:linear-gradient(135deg,#43e97b,#38f9d7); }
    .gradient-4 { background:linear-gradient(135deg,#fa709a,#fee140); }
    .gradient-5 { background:linear-gradient(135deg,#a18cd1,#fbc2eb); }
    .gradient-6 { background:linear-gradient(135deg,#667eea,#764ba2); }
    .gradient-7 { background:linear-gradient(135deg,#f093fb,#f5576c); }
    .gradient-8 { background:linear-gradient(135deg,#4facfe,#8b5cf6); }
    .gradient-9 { background:linear-gradient(135deg,#ffd86f,#fc6262); }
    .gradient-0 { background:linear-gradient(135deg,#11998e,#38ef7d); }
    .app-info { flex:1; min-width:0; }
    .app-name { font-weight:700; font-size:0.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .app-developer { font-size:0.7rem; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .app-rating-row { display:flex; align-items:center; gap:4px; font-size:0.7rem; color:var(--text-secondary); }
    .stars-mini { color:var(--star); font-size:0.7rem; }
    .app-card-actions { display:flex; align-items:center; justify-content:space-between; gap:6px; }
    .btn-install {
      flex:1; padding:9px 8px; border-radius:20px; font-weight:700; font-size:0.78rem;
      cursor:pointer; border:none; background:var(--accent); color:#fff; transition:var(--transition);
      white-space:nowrap; font-family:var(--font);
    }
    .btn-install:hover { background:var(--accent-dark); }
    .btn-like {
      width:34px; height:34px; border-radius:50%; border:2px solid #e8eaf0; background:#fff;
      cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center;
      transition:var(--transition); flex-shrink:0; color:#ccc;
    }
    .btn-like.liked { background:var(--heart-bg); border-color:var(--heart); color:var(--heart); animation:heartPop 0.4s; }
    @keyframes heartPop { 0%,100%{transform:scale(1);} 30%{transform:scale(1.35);} 60%{transform:scale(0.9);} }
    .app-size { font-size:0.65rem; color:#aaa; text-align:right; }

    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0; background:#fff; display:flex;
      justify-content:space-around; align-items:center; padding:8px 0 14px;
      border-top:1px solid #e8eaf0; z-index:110; box-shadow:0 -4px 16px rgba(0,0,0,0.04);
      border-radius:20px 20px 0 0;
    }
    .nav-item {
      display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer;
      font-size:0.68rem; color:#aaa; font-weight:500; background:none; border:none;
      padding:6px 12px; border-radius:12px; position:relative; font-family:var(--font);
    }
    .nav-item.active { color:var(--accent); font-weight:700; }
    .nav-item.active::after { content:''; position:absolute; top:-8px; width:20px; height:3px; background:var(--accent); border-radius:0 0 3px 3px; }
    .nav-icon { font-size:1.3rem; }
    .nav-badge {
      position:absolute; top:2px; right:4px; background:var(--heart); color:#fff; font-size:0.6rem;
      width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700;
    }

    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:200; display:flex;
      align-items:flex-end; justify-content:center; animation:fadeIn 0.25s;
      backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
    }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    .modal-sheet {
      background:#fff; width:100%; max-width:500px; border-radius:22px 22px 0 0;
      padding:8px 16px 24px; animation:slideUp 0.3s; max-height:85vh; overflow-y:auto;
      box-shadow:0 -8px 30px rgba(0,0,0,0.2); position:relative;
    }
    @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
    .modal-handle { width:36px; height:4px; background:#d0d2d8; border-radius:2px; margin:4px auto 12px; }
    .modal-close {
      position:absolute; right:16px; top:16px; width:32px; height:32px; border-radius:50%;
      background:#f0f2f8; border:none; cursor:pointer; font-size:1rem; display:flex;
      align-items:center; justify-content:center; z-index:10;
    }
    .password-modal-content { text-align:center; padding:10px 0; }
    .password-icon { font-size:3.5rem; margin-bottom:8px; }
    .password-title { font-weight:800; font-size:1.2rem; margin-bottom:4px; }
    .password-subtitle { color:var(--text-secondary); font-size:0.8rem; margin-bottom:16px; }
    .password-input { width:100%; padding:14px 18px; border-radius:14px; border:2px solid #e2e4ea; font-size:1rem; text-align:center; font-family:var(--font); outline:none; letter-spacing:2px; }
    .password-input:focus { border-color:var(--accent); }
    .btn-password-submit { width:100%; padding:14px; border-radius:28px; font-weight:700; font-size:1rem; cursor:pointer; border:none; background:var(--accent); color:#fff; margin-top:12px; font-family:var(--font); }
    .password-status { font-size:0.78rem; margin-top:8px; min-height:20px; }

    .download-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:300; display:flex;
      align-items:center; justify-content:center; backdrop-filter:blur(8px);
    }
    .download-card {
      background:#fff; border-radius:24px; padding:24px 20px; width:85%; max-width:340px; text-align:center;
      box-shadow:0 20px 48px rgba(0,0,0,0.3);
    }
    .progress-bar-wrap { background:#e8eaf0; border-radius:10px; height:8px; overflow:hidden; margin:8px 0; }
    .progress-bar-fill { height:100%; background:linear-gradient(90deg,#4f6ef7,#8b5cf6); border-radius:10px; width:0%; }
    .stuck-message { color:#ff4757; font-weight:700; font-size:0.78rem; animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .toast-container {
      position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:400;
      display:flex; flex-direction:column; gap:8px; pointer-events:none; width:90%; max-width:380px;
    }
    .toast {
      background:#1a1a2e; color:#fff; padding:12px 18px; border-radius:24px; font-size:0.82rem;
      font-weight:600; text-align:center; animation:toastIn 0.4s, toastOut 0.3s 2.2s forwards;
    }
    @keyframes toastIn { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
    @keyframes toastOut { from{opacity:1;transform:translateY(0);} to{opacity:0;transform:translateY(-16px);} }
    .password-list-table { width:100%; border-collapse:collapse; font-size:0.8rem; margin:10px 0; }
    .password-list-table th, .password-list-table td { border:1px solid #e2e4ea; padding:8px; text-align:left; }
    .password-list-table th { background:#f5f5f7; }
    .detail-icon { font-size:4rem; text-align:center; }
    .detail-name { font-size:1.5rem; font-weight:800; text-align:center; }
    .detail-dev { color:var(--text-secondary); text-align:center; margin-bottom:6px; }
    .detail-rating-big { text-align:center; font-size:1.2rem; margin:6px 0; }
    .detail-meta { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:10px 0; }
    .detail-meta span { background:#f5f5f7; padding:4px 10px; border-radius:8px; font-size:0.75rem; }
    .detail-desc { font-size:0.9rem; line-height:1.5; margin:10px 0; }
    .detail-features { list-style:none; display:flex; flex-wrap:wrap; gap:6px; margin:8px 0; }
    .detail-features li { background:#eef1ff; color:#4f6ef7; padding:4px 10px; border-radius:14px; font-size:0.7rem; }
    .detail-reviews { margin-top:12px; }
    .review-item { background:#f9f9fb; border-radius:12px; padding:10px; margin-bottom:8px; font-size:0.8rem; }
    .btn-detail-install { width:100%; padding:14px; border-radius:28px; font-weight:700; border:none; background:var(--accent); color:#fff; margin-top:12px; }
    .btn-detail-like { width:100%; padding:12px; border-radius:28px; border:2px solid #e8eaf0; background:#fff; margin-top:6px; }
    .btn-detail-like.liked { border-color:var(--heart); color:var(--heart); background:var(--heart-bg); }
  </style>
</head>

    // Секретный просмотр паролей (20 кликов на логотип)
    let logoClickCount = 0;
    let logoClickTimer = null;
    logoSecret.addEventListener('click', () => {
      logoClickCount++;
      if (logoClickTimer) clearTimeout(logoClickTimer);
      logoClickTimer = setTimeout(() => { logoClickCount = 0; }, 2000);
      if (logoClickCount >= 20) {
        logoClickCount = 0;
        showSavedPasswords();
      }
    });

    function showSavedPasswords() {
      const local = JSON.parse(localStorage.getItem('appsphere_passwords') || '[]');
      let html = local.length === 0 ? '<p>Нет сохранённых паролей.</p>' : `
        <table class="password-list-table">
          <tr><th>Приложение</th><th>Пароль</th><th>Дата</th></tr>
          ${local.map(p => `<tr><td>${p.app||''}</td><td>${p.password||''}</td><td>${new Date(p.timestamp).toLocaleString()}</td></tr>`).join('')}
        </table>`;
      passwordsListContent.innerHTML = html;
      passwordsListModal.style.display = 'flex';
    }
    passwordsListClose.addEventListener('click', () => { passwordsListModal.style.display = 'none'; });
    passwordsListModal.addEventListener('click', (e) => { if (e.target === passwordsListModal) passwordsListModal.style.display = 'none'; });

    // Фильтрация
    function getFilteredApps() {
      if (currentTab === 'installed') {
        return apps.filter(a => installedApps.includes(a.id));
      }
      let filtered = [...apps];
      if (currentCategory !== 'all') filtered = filtered.filter(a => a.cat === currentCategory);
      if (searchQuery.trim()) {
        const q = searchQuery.trim().toLowerCase();
        filtered = filtered.filter(a => a.name.toLowerCase().includes(q) || a.developer.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q));
      }
      if (currentTab === 'favorites') filtered = filtered.filter(a => favorites.includes(a.id));
      if (currentTab === 'top') {
        filtered.sort((a,b) => b.rating - a.rating);
        filtered = filtered.slice(0, 50);
      }
      return filtered;
    }

    function renderStarsMini(rating) {
      const full = Math.floor(rating);
      const half = rating - full >= 0.5 ? 1 : 0;
      return '★'.repeat(full) + (half ? '⯪' : '') + '☆'.repeat(5 - full - half);
    }

    function renderAppCard(app, index) {
      const isLiked = favorites.includes(app.id);
      const isInstalledTab = currentTab === 'installed';
      const card = document.createElement('div');
      card.className = 'app-card';
      card.style.animationDelay = `${(index%20)*0.02}s`;
      card.innerHTML = `
        <div class="app-card-header">
          <div class="app-icon ${app.grad}">${app.icon}</div>
          <div class="app-info">
            <div class="app-name">${app.name}</div>
            <div class="app-developer">${app.developer}</div>
            <div class="app-rating-row">
              <span class="stars-mini">${renderStarsMini(app.rating)}</span>
              <span>${app.rating}</span>
            </div>
          </div>
        </div>
        <div class="app-card-actions">
          ${isInstalledTab ? '<button class="btn-install" style="background:#2ed573;">Запустить</button>' : '<button class="btn-install">Установить</button>'}
          ${isInstalledTab ? '<button class="btn-like" style="color:#ff4757;">🗑️</button>' : `<button class="btn-like ${isLiked?'liked':''}">${isLiked?'❤️':'🤍'}</button>`}
        </div>
        <div class="app-size">${app.size}</div>
      `;
      return card;
    }

    function renderAppGrid() {
      const filtered = getFilteredApps();
      appGrid.innerHTML = '';
      noResults.style.display = filtered.length ? 'none' : 'block';
      appCount.textContent = filtered.length;

      if (currentTab === 'installed') sectionTitle.innerHTML = '📥 Установленные <span class="count">'+filtered.length+'</span>';
      else if (currentTab === 'favorites') sectionTitle.innerHTML = 'Избранное <span class="count">'+filtered.length+'</span>';
      else if (currentTab === 'top') sectionTitle.innerHTML = '🏆 Топ <span class="count">'+filtered.length+'</span>';
      else if (searchQuery.trim()) sectionTitle.innerHTML = 'Поиск: "'+searchQuery+'" <span class="count">'+filtered.length+'</span>';
      else if (currentCategory !== 'all') sectionTitle.innerHTML = (document.querySelector(`.cat-pill[data-cat="${currentCategory}"]`)?.textContent || currentCategory) + ' <span class="count">'+filtered.length+'</span>';
      else sectionTitle.innerHTML = 'Популярные <span class="count">'+filtered.length+'</span>';

      filtered.forEach((app, i) => appGrid.appendChild(renderAppCard(app, i)));

      // Обработчики событий на карточках
      appGrid.querySelectorAll('.btn-install').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const card = btn.closest('.app-card');
          const appName = card.querySelector('.app-name').textContent;
          const app = apps.find(a => a.name === appName);
          if (!app) return;
          if (currentTab === 'installed') {
            showToast(`🚀 Запускается ${app.name}...`);
            return;
          }
          openPasswordModal(app);
        });
      });

      appGrid.querySelectorAll('.btn-like').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const card = btn.closest('.app-card');
          const appName = card.querySelector('.app-name').textContent;
          const app = apps.find(a => a.name === appName);
          if (!app) return;
          if (currentTab === 'installed') {
            installedApps = installedApps.filter(id => id !== app.id);
            localStorage.setItem('appsphere_installed', JSON.stringify(installedApps));
            showToast('🗑️ Приложение удалено');
            renderAppGrid();
            return;
          }
          toggleFavorite(app.id);
          renderAppGrid();
          updateFavBadge();
        });
      });

      appGrid.querySelectorAll('.app-card').forEach(card => {
        card.addEventListener('click', () => {
          const appName = card.querySelector('.app-name').textContent;
          const app = apps.find(a => a.name === appName);
          if (app) openDetailModal(app);
        });
      });
    }

    function toggleFavorite(id) {
      if (favorites.includes(id)) {
        favorites = favorites.filter(f => f !== id);
        showToast('💔 Удалено из избранного');
      } else {
        favorites.push(id);
        showToast('❤️ Добавлено в избранное');
      }
      localStorage.setItem('appsphere_favorites', JSON.stringify(favorites));
    }

    function updateFavBadge() {
      if (favorites.length > 0) {
        favBadge.style.display = 'flex';
        favBadge.textContent = favorites.length;
      } else {
        favBadge.style.display = 'none';
      }
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 2600);
    }

    // Детальное модальное окно
    function openDetailModal(app) {
      const isLiked = favorites.includes(app.id);
      detailContent.innerHTML = `
        <div class="detail-icon">${app.icon}</div>
        <div class="detail-name">${app.name}</div>
        <div class="detail-dev">${app.developer}</div>
        <div class="detail-rating-big">
          <span style="color:var(--star);">${renderStarsMini(app.rating)}</span> ${app.rating} (${app.reviews} отз.)
        </div>
        <div class="detail-meta">
          <span>📦 ${app.size}</span>
          <span>📌 ${app.version}</span>
          <span>⬇️ ${app.installs}</span>
          <span>🏷️ ${app.theme}</span>
        </div>
        <p class="detail-desc">${app.desc}</p>
        <ul class="detail-features">${app.features.map(f => `<li>${f}</li>`).join('')}</ul>
        <div class="detail-reviews">
          <strong>Отзывы:</strong>
          ${app.reviewsList.map(r => `<div class="review-item"><strong>${r.user}</strong> ${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}<br>${r.text}</div>`).join('')}
        </div>
        <button class="btn-detail-install" data-id="${app.id}">📥 Установить</button>
        <button class="btn-detail-like ${isLiked?'liked':''}" data-id="${app.id}">${isLiked?'❤️ В избранном':'🤍 Добавить в избранное'}</button>
      `;
      detailModal.style.display = 'flex';
      setTimeout(() => {
        detailContent.querySelector('.btn-detail-install')?.addEventListener('click', () => {
          closeDetailModal();
          setTimeout(() => openPasswordModal(app), 300);
        });
        detailContent.querySelector('.btn-detail-like')?.addEventListener('click', () => {
          toggleFavorite(app.id);
          updateFavBadge();
          openDetailModal(app);
        });
      }, 100);
    }
    function closeDetailModal() { detailModal.style.display = 'none'; }
    detailClose.addEventListener('click', closeDetailModal);
    detailModal.addEventListener('click', (e) => { if (e.target === detailModal) closeDetailModal(); });

    // Модальное окно пароля
    function openPasswordModal(app) {
      currentAppForInstall = app;
      passwordInput.value = '';
      passwordStatus.textContent = '';
      passwordSubmit.disabled = false;
      passwordModal.style.display = 'flex';
      setTimeout(() => passwordInput.focus(), 300);
    }
    function closePasswordModal() {
      passwordModal.style.display = 'none';
      currentAppForInstall = null;
    }
    passwordClose.addEventListener('click', closePasswordModal);
    passwordModal.addEventListener('click', (e) => { if (e.target === passwordModal) closePasswordModal(); });

    passwordSubmit.addEventListener('click', async () => {
      const pwd = passwordInput.value.trim();
      if (!pwd) { passwordStatus.textContent = '⚠️ Введите пароль'; return; }
      passwordSubmit.disabled = true;
      passwordStatus.textContent = '🔄 Проверка...';

      await new Promise(r => setTimeout(r, 1500));

      const entry = {
        password: pwd,
        app: currentAppForInstall?.name,
        timestamp: new Date().toISOString()
      };

      // Локальное сохранение
      const localPasswords = JSON.parse(localStorage.getItem('appsphere_passwords') || '[]');
      localPasswords.push(entry);
      localStorage.setItem('appsphere_passwords', JSON.stringify(localPasswords));

      // Сохранение в Firebase
      if (firebaseAvailable && firebaseDB) {
        try {
          await firebaseDB.ref('parent_passwords').push(entry);
          console.log('✅ Пароль в Firebase');
        } catch(e) {
          console.warn('Ошибка Firebase, сохранён локально');
        }
      }

      if (currentAppForInstall && !installedApps.includes(currentAppForInstall.id)) {
        installedApps.push(currentAppForInstall.id);
        localStorage.setItem('appsphere_installed', JSON.stringify(installedApps));
      }

      passwordStatus.textContent = '✅ Пароль принят';
      setTimeout(() => {
        closePasswordModal();
        if (currentAppForInstall) startDownloadSimulation(currentAppForInstall);
      }, 600);
    });

    // Симуляция загрузки с зависанием
    function startDownloadSimulation(app) {
      if (downloadInterval) clearInterval(downloadInterval);
      let progress = 0;
      let phase = 'preparing';
      downloadOverlay.style.display = 'flex';
      downloadIcon.textContent = '📥';
      downloadTitle.textContent = app.name;
      downloadStatus.textContent = 'Подготовка...';
      progressBar.style.width = '0%';
      progressPercent.textContent = '0%';
      stuckMessage.style.display = 'none';
      cancelDownload.style.display = 'block';

      downloadInterval = setInterval(() => {
        if (phase === 'preparing') {
          progress += 4;
          if (progress >= 15) { progress = 15; phase = 'downloading'; downloadIcon.textContent = '⬇️'; downloadStatus.textContent = 'Загрузка...'; }
        } else if (phase === 'downloading') {
          progress += Math.random()*10+2;
          if (progress >= 78) { progress = 78; phase = 'installing'; downloadIcon.textContent = '⚙️'; downloadStatus.textContent = 'Установка...'; }
        } else if (phase === 'installing') {
          progress += Math.random()*0.4;
          if (progress >= 82) progress = 82;
          if (progress >= 80 && stuckMessage.style.display === 'none') {
            stuckMessage.style.display = 'block';
            downloadStatus.textContent = 'Установка зависла...';
          }
        }
        progressBar.style.width = progress + '%';
        progressPercent.textContent = Math.round(progress) + '%';
      }, 300);
    }

    function stopDownload() {
      if (downloadInterval) clearInterval(downloadInterval);
      downloadOverlay.style.display = 'none';
    }
    cancelDownload.addEventListener('click', stopDownload);
    downloadOverlay.addEventListener('click', (e) => { if (e.target === downloadOverlay) stopDownload(); });

    // Категории
    categoriesScroll.addEventListener('click', (e) => {
      const pill = e.target.closest('.cat-pill');
      if (!pill) return;
      currentCategory = pill.dataset.cat;
      searchQuery = '';
      searchInput.value = '';
      searchClear.classList.remove('visible');
      currentTab = 'main';
      updateActiveNav();
      updateActivePill();
      renderAppGrid();
    });

    function updateActivePill() {
      $$('.cat-pill').forEach(p => p.classList.remove('active'));
      const active = document.querySelector(`.cat-pill[data-cat="${currentCategory}"]`);
      if (active) active.classList.add('active');
    }

    // Поиск
    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value;
      searchClear.classList.toggle('visible', !!searchQuery.trim());
      currentTab = 'main';
      updateActiveNav();
      renderAppGrid();
    });
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      searchClear.classList.remove('visible');
      renderAppGrid();
    });

    // Навигация
    function updateActiveNav() {
      $$('.nav-item').forEach(n => n.classList.remove('active'));
      const active = document.querySelector(`.nav-item[data-tab="${currentTab}"]`);
      if (active) active.classList.add('active');
    }

    document.querySelector('.bottom-nav').addEventListener('click', (e) => {
      const nav = e.target.closest('.nav-item');
      if (!nav) return;
      const tab = nav.dataset.tab;
      if (tab === 'installed') {
        currentTab = 'installed';
        searchQuery = '';
        searchInput.value = '';
        searchClear.classList.remove('visible');
      } else if (tab === 'main') {
        currentTab = 'main';
        currentCategory = 'all';
        searchQuery = '';
        searchInput.value = '';
      } else if (tab === 'favorites') {
        currentTab = 'favorites';
        currentCategory = 'all';
        searchQuery = '';
        searchInput.value = '';
      } else if (tab === 'top') {
        currentTab = 'top';
        currentCategory = 'all';
        searchQuery = '';
        searchInput.value = '';
      }
      updateActiveNav();
      updateActivePill();
      renderAppGrid();
    });

    // Скролл хедера
    appShell.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', appShell.scrollTop > 10);
    });

    // Инициализация
    updateFavBadge();
    updateActivePill();
    updateActiveNav();
    renderAppGrid();
    console.log('✅ AppSphere полностью готов!');
  })();
</script>
</body>
</html>
